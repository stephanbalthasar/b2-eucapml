name: Build booklet index (public → private artifacts)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Mondays 04:00 UTC

permissions:
  contents: read

jobs:
  index-booklet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this (public) repo
        uses: actions/checkout@v4

      - name: Checkout private repo (EUCapML-Mentor-Content)
        uses: actions/checkout@v4
        with:
          repository: stephanbalthasar/EUCapML-Mentor-Content
          ref: main
          path: private-src
          token: ${{ secrets.REPO_XPAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      # --- CHANGED: write output directly into the private repo checkout ---
      - name: Build JSON from DOCX
        run: |
          python mentor/booklet/build_booklet_index.py \
            --src "private-src/assets/booklet.docx" \
            --out "private-src/artifacts/booklet_index.json" \
            --verbose

      # --- CHANGED: no copy; commit the file that already sits in private-src/artifacts/ ---
      - name: Commit JSON into private repo (artifacts/)
        working-directory: private-src
        env:
          PAT: ${{ secrets.REPO_XPAT }}
        run: |
          # Remove checkout’s extra header before cross-repo push (important)
          git config --unset-all http.https://github.com/.extraheader || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add artifacts/booklet_index.json

          if ! git diff --cached --quiet; then
            git commit -m "ci: update booklet_index.json"
            git push "https://x-access-token:${PAT}@github.com/stephanbalthasar/EUCapML-Mentor-Content.git" HEAD:main
          else
            echo "No JSON changes to commit."
          fi
