name: Build booklet index (run exact attached script)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/build-booklet-index.yml"
      - "mentor/booklet/build_booklet_index.py"

# We push with your PAT secret; GITHUB_TOKEN perms stay minimal.
permissions:
  contents: read

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo (this repo)
        uses: actions/checkout@v4

      - name: Checkout private content repo
        uses: actions/checkout@v4
        with:
          repository: stephanbalthasar/EUCapML-Mentor-Content
          token: ${{ secrets.REPO_XPAT }}   # <-- your secret name
          path: private-content

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      - name: Run your EXACT script against the private repo file
        shell: bash
        run: |
          set -euo pipefail
          python mentor/booklet/build_booklet_index.py \
            --src private-content/assets/booklet.docx \
            --out private-content/artifacts/booklet_index.json \
            --verbose

      - name: Commit and push JSON to private repo (only if changed)
        working-directory: private-content
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add artifacts/booklet_index.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update artifacts/booklet_index.json [skip ci]"
            # Adjust if your private repo default branch is not 'main'
            git push origin HEAD:main
          fi

      - name: Upload workflow artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: booklet_index.json
          path: private-content/artifacts/booklet_index.json
          if-no-files-found: warn
``
